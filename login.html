<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>PU Prime – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #006bff;
      --bg-dark: #0b0c1a;
      --bg-card: #141527;
      --bg-card2: #1a1b2e;
      --border-dark: rgba(255,255,255,0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.35);
      --text-hard: #ffffff;
    }

    body {
      background: var(--bg-dark);
      min-height: 100vh;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      color: var(--text-primary);
    }

    .phone {
      width: 393px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--bg-dark);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── BACKGROUND GLOW ─── */
    .login-bg-glow {
      position: absolute;
      top: -60px;
      left: -100px;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,107,255,0.30) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .login-bg-glow-2 {
      position: absolute;
      top: 40px;
      right: -80px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,180,255,0.16) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── STATUS BAR ─── */
    .status-bar {
      height: 54px;
      display: flex;
      align-items: flex-end;
      padding: 0 20px 10px;
      justify-content: space-between;
      position: relative;
      z-index: 20;
    }
    .status-time { font-size: 17px; font-weight: 600; color: #fff; line-height: 22px; }
    .status-icons { display: flex; align-items: center; gap: 6px; color: #fff; }
    .status-icons svg { fill: #fff; }

    /* ─── NAVBAR (back btn) ─── */
    .navbar {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      position: relative;
      z-index: 20;
    }
    .nav-back {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border-dark);
      color: #fff;
      cursor: pointer;
      text-decoration: none;
    }
    .nav-back svg { width: 18px; height: 18px; }

    /* ─── CONTENT ─── */
    .login-content {
      flex: 1;
      padding: 24px 24px 0;
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .login-title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 36px;
      color: #fff;
      margin-top: 16px;
    }

    /* ─── FORM ─── */
    .form { display: flex; flex-direction: column; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field-label {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      letter-spacing: -0.12px;
    }
    .field-input {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-dark);
      border-radius: 12px;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .field-input:focus-within {
      border-color: rgba(0,107,255,0.55);
      box-shadow: 0 0 0 3px rgba(0,107,255,0.18);
    }
    .field-input input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      letter-spacing: -0.16px;
    }
    .field-input input::placeholder { color: var(--text-muted); }
    .field-icon {
      width: 22px;
      height: 22px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .field-icon svg { width: 22px; height: 22px; }
    .forgot {
      align-self: flex-start;
      margin-top: 2px;
      font-size: 12px;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      letter-spacing: -0.12px;
    }
    .forgot:hover { color: #fff; }

    /* ─── PRIMARY BUTTON ─── */
    .btn-primary {
      width: 100%;
      height: 50px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.06px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,107,255,0.35);
      transition: filter 0.18s;
      margin-top: 4px;
    }
    .btn-primary:hover { filter: brightness(1.08); }

    /* ─── DIVIDER ─── */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }
    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-dark);
    }
    .or-divider span {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      letter-spacing: -0.14px;
    }

    /* ─── SOCIAL BUTTONS ─── */
    .socials { display: flex; gap: 16px; }
    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 56px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: -0.16px;
      transition: background 0.18s, border-color 0.18s;
    }
    .btn-social:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.28); }
    .btn-social svg { width: 20px; height: 20px; }

    /* ─── SIGNUP ROW ─── */
    .signup-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 32px 0 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      letter-spacing: -0.12px;
    }
    .signup-link {
      color: var(--blue);
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 15px;
      padding: 0;
    }
    .signup-link:hover { filter: brightness(1.15); }

    /* ─── HOME INDICATOR ─── */
    .home-indicator-area {
      width: 100%;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .home-indicator {
      width: 139px;
      height: 5px;
      border-radius: 100px;
      background: #fff;
      opacity: 0.9;
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="login-bg-glow"></div>
  <div class="login-bg-glow-2"></div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12">
        <rect x="0" y="8" width="3" height="4" rx="0.5" fill="currentColor"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="0.5" fill="currentColor"/>
        <rect x="9" y="3" width="3" height="9" rx="0.5" fill="currentColor"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="currentColor"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 9.5L8 9.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M5.5 7.2C6.2 6.5 7.05 6.1 8 6.1C8.95 6.1 9.8 6.5 10.5 7.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M3 4.7C4.35 3.4 6.1 2.6 8 2.6C9.9 2.6 11.65 3.4 13 4.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M0.5 2.1C2.35 0.35 5.05 -0.5 8 0.2C10.5 0.5 12.7 1.65 14.5 3.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
      </svg>
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="17" height="9" rx="2" fill="currentColor"/>
        <path d="M23.5 4.5V8.5C24.5 8 24.5 5 23.5 4.5Z" fill="currentColor" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- NAVBAR -->
  <div class="navbar">
    <a class="nav-back" href="index.html" aria-label="Back">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 5L8 11L14 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>

  <!-- CONTENT -->
  <div class="login-content">
    <h1 class="login-title">Login</h1>

    <form class="form" onsubmit="event.preventDefault();">
      <!-- EMAIL -->
      <div class="field">
        <label class="field-label" for="login-email">Email address</label>
        <div class="field-input">
          <input id="login-email" type="email" placeholder="Email address" autocomplete="email" />
          <div class="field-icon" aria-hidden="true">
            <!-- log-in icon: arrow into doorway -->
            <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M13.5 3H17.5C18.6 3 19.5 3.9 19.5 5V17C19.5 18.1 18.6 19 17.5 19H13.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9.5 7L13.5 11L9.5 15" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M13 11H3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="field">
        <label class="field-label" for="login-password">Password</label>
        <div class="field-input">
          <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" />
          <button type="button" class="field-icon" id="toggle-password" aria-label="Show password">
            <!-- eye-off (default) -->
            <svg id="icon-eye-off" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 3L19 19" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
              <path d="M9.4 5.4C9.92 5.3 10.45 5.25 11 5.25C16 5.25 19.5 11 19.5 11C18.95 12 18.27 12.93 17.5 13.75" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5.5 7.5C3.85 8.95 2.5 11 2.5 11C2.5 11 6 16.75 11 16.75C12.4 16.75 13.65 16.3 14.7 15.65" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9.2 9.2C8.7 9.7 8.4 10.35 8.4 11C8.4 12.45 9.55 13.6 11 13.6C11.65 13.6 12.3 13.3 12.8 12.8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
            <!-- eye (shown when password is visible) -->
            <svg id="icon-eye" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
              <path d="M2.5 11S6 5.25 11 5.25 19.5 11 19.5 11 16 16.75 11 16.75 2.5 11 2.5 11Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="11" cy="11" r="2.6" stroke="currentColor" stroke-width="1.7"/>
            </svg>
          </button>
        </div>
        <button type="button" class="forgot">Forgot password?</button>
      </div>

      <button type="submit" class="btn-primary">LOG IN</button>
    </form>

    <div class="or-divider"><span>Or login with</span></div>

    <div class="socials">
      <button type="button" class="btn-social">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.05 12.04c-.03-2.86 2.34-4.24 2.45-4.31-1.34-1.95-3.42-2.22-4.16-2.25-1.77-.18-3.46 1.04-4.36 1.04-.91 0-2.29-1.02-3.77-.99-1.94.03-3.73 1.13-4.73 2.86-2.02 3.5-.51 8.66 1.45 11.49.96 1.39 2.09 2.94 3.58 2.89 1.44-.06 1.99-.93 3.73-.93 1.74 0 2.23.93 3.76.9 1.55-.03 2.53-1.41 3.48-2.81 1.1-1.61 1.55-3.18 1.58-3.26-.03-.01-3.03-1.16-3.06-4.59zm-2.86-8.43c.79-.96 1.32-2.29 1.18-3.61-1.14.05-2.52.76-3.34 1.71-.73.85-1.37 2.21-1.2 3.51 1.27.1 2.57-.65 3.36-1.61z"/>
        </svg>
        Apple
      </button>
      <button type="button" class="btn-social">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M23.49 12.27c0-.79-.07-1.54-.19-2.27H12v4.51h6.46c-.27 1.4-1.06 2.59-2.28 3.39v2.83h3.69c2.16-1.99 3.62-5.05 3.62-8.46z" fill="#4285f4"/>
          <path d="M12 24c3.24 0 5.95-1.07 7.93-2.91l-3.69-2.83c-1.02.69-2.34 1.1-4.24 1.1-3.24 0-5.99-2.18-6.97-5.13H1.21v3.04C3.18 21.16 7.27 24 12 24z" fill="#34a853"/>
          <path d="M5.03 14.23c-.25-.69-.39-1.42-.39-2.23s.14-1.54.39-2.23V6.73H1.21C.44 8.31 0 10.1 0 12s.44 3.69 1.21 5.27l3.82-3.04z" fill="#fbbc04"/>
          <path d="M12 4.75c1.77 0 3.35.61 4.6 1.79l3.27-3.27C17.95 1.31 15.24 0 12 0 7.27 0 3.18 2.84 1.21 6.73l3.82 3.04C6.01 6.93 8.76 4.75 12 4.75z" fill="#ea4335"/>
        </svg>
        Google
      </button>
    </div>

    <div class="signup-row">
      <span>Don't have an account?</span>
      <button type="button" class="signup-link">Sign up</button>
    </div>
  </div>

  <!-- HOME INDICATOR -->
  <div class="home-indicator-area">
    <div class="home-indicator"></div>
  </div>
</div>

<script>
  const toggle = document.getElementById('toggle-password');
  const pw = document.getElementById('login-password');
  const iconOff = document.getElementById('icon-eye-off');
  const iconOn  = document.getElementById('icon-eye');
  toggle.addEventListener('click', () => {
    const isPw = pw.type === 'password';
    pw.type = isPw ? 'text' : 'password';
    iconOff.style.display = isPw ? 'none'  : 'block';
    iconOn.style.display  = isPw ? 'block' : 'none';
    toggle.setAttribute('aria-label', isPw ? 'Hide password' : 'Show password');
  });
</script>
</body>
</html>
