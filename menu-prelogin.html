<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>PU Prime – Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1dd1a1;
      --red: #ee5253;
      --blue: #006bff;
      --bg-dark: #0b0c1a;
      --bg-card: #141527;
      --bg-card2: #1a1b2e;
      --border-dark: rgba(255,255,255,0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.35);
    }

    body {
      background: var(--bg-dark);
      min-height: 100vh;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
    }

    .phone {
      width: 393px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--bg-dark);
      position: relative;
      overflow: hidden;
    }

    /* ─── BG GLOWS ─── */
    .menu-glow-1 {
      position: absolute;
      top: -80px; left: -120px;
      width: 360px; height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,107,255,0.22) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .menu-glow-2 {
      position: absolute;
      top: 100px; right: -90px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,180,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── STATUS BAR ─── */
    .status-bar {
      height: 54px;
      display: flex;
      align-items: flex-end;
      padding: 0 20px 10px;
      justify-content: space-between;
      position: relative;
      z-index: 20;
    }
    .status-time { font-size: 17px; font-weight: 600; color: #fff; line-height: 22px; }
    .status-icons { display: flex; align-items: center; gap: 6px; color: #fff; }
    .status-icons svg { fill: #fff; }

    /* ─── NAVBAR ─── */
    .navbar {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      justify-content: space-between;
      position: relative;
      z-index: 20;
    }
    .nav-back {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border-dark);
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
    }
    .nav-back svg { width: 18px; height: 18px; }
    .nav-icon-btn {
      width: 18px; height: 18px;
      background: none;
      border: none;
      padding: 0;
      color: #fff;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-icon-btn svg { width: 18px; height: 18px; }
    .nav-icon-btn:hover { opacity: 0.75; }

    /* ─── WELCOME PROFILE (pre-login) ─── */
    .welcome-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 4px 24px 24px;
      border-bottom: 1px solid var(--border-dark);
      position: relative;
      z-index: 5;
    }
    .welcome-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .welcome-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-secondary);
    }
    .welcome-avatar svg { width: 26px; height: 26px; }
    .welcome-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .welcome-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.18px;
      line-height: 1.2;
    }
    .welcome-sub {
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: -0.12px;
    }
    .welcome-login-btn {
      flex-shrink: 0;
      padding: 0 18px;
      height: 36px;
      border-radius: 100px;
      background: var(--blue);
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.06px;
      box-shadow: 0 4px 14px rgba(0,107,255,0.35);
      transition: filter 0.18s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .welcome-login-btn:hover { filter: brightness(1.08); }

    /* ─── SECTION ─── */
    .menu-section { padding: 28px 0 20px; }
    .menu-section-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.16px;
      padding: 0 24px;
      margin-bottom: 18px;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px 0;
      padding: 0 24px;
    }
    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 6px 0;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      color: #eee;
      transition: opacity 0.18s;
    }
    .menu-item:hover { opacity: 0.75; }
    .menu-item-icon {
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      position: relative;
    }
    .menu-item-icon svg { width: 100%; height: 100%; display: block; }
    .menu-item-label {
      font-size: 12px;
      color: #eee;
      text-align: center;
      line-height: 1.25;
      letter-spacing: -0.12px;
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="menu-glow-1"></div>
  <div class="menu-glow-2"></div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12">
        <rect x="0" y="8" width="3" height="4" rx="0.5" fill="currentColor"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="0.5" fill="currentColor"/>
        <rect x="9" y="3" width="3" height="9" rx="0.5" fill="currentColor"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="currentColor"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 9.5L8 9.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M5.5 7.2C6.2 6.5 7.05 6.1 8 6.1C8.95 6.1 9.8 6.5 10.5 7.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M3 4.7C4.35 3.4 6.1 2.6 8 2.6C9.9 2.6 11.65 3.4 13 4.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M0.5 2.1C2.35 0.35 5.05 -0.5 8 0.2C10.5 0.5 12.7 1.65 14.5 3.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
      </svg>
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="17" height="9" rx="2" fill="currentColor"/>
        <path d="M23.5 4.5V8.5C24.5 8 24.5 5 23.5 4.5Z" fill="currentColor" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- NAVBAR -->
  <div class="navbar">
    <a class="nav-back" href="index.html" aria-label="Back">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 5L8 11L14 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <button class="nav-icon-btn" aria-label="Settings" type="button">
      <!-- Cog / gear with proper teeth -->
      <svg viewBox="-1.5 -1.5 25 25" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19.4 13.1c0.06-0.36 0.1-0.72 0.1-1.1s-0.04-0.74-0.1-1.1l2.16-1.69a0.5 0.5 0 0 0 0.12-0.65l-2.05-3.55a0.5 0.5 0 0 0-0.61-0.22l-2.55 1.02a7.6 7.6 0 0 0-1.9-1.1l-0.39-2.71A0.5 0.5 0 0 0 13.7 1.6h-4.1a0.5 0.5 0 0 0-0.49 0.4l-0.39 2.71a7.7 7.7 0 0 0-1.9 1.1L4.27 4.79a0.5 0.5 0 0 0-0.6 0.22L1.62 8.56a0.5 0.5 0 0 0 0.12 0.65l2.16 1.69a7.7 7.7 0 0 0 0 2.2l-2.16 1.69a0.5 0.5 0 0 0-0.12 0.65l2.05 3.55c0.13 0.23 0.39 0.32 0.6 0.22l2.55-1.02c0.55 0.43 1.18 0.79 1.9 1.1l0.39 2.71c0.04 0.23 0.25 0.4 0.49 0.4h4.1c0.24 0 0.45-0.17 0.49-0.4l0.39-2.71a7.6 7.6 0 0 0 1.9-1.1l2.55 1.02c0.22 0.1 0.48 0.01 0.61-0.22l2.05-3.55a0.5 0.5 0 0 0-0.12-0.65l-2.16-1.69Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        <circle cx="11" cy="12" r="2.6" stroke="currentColor" stroke-width="1.4"/>
      </svg>
    </button>
  </div>

  <!-- WELCOME (pre-login) -->
  <div class="welcome-row">
    <div class="welcome-left">
      <div class="welcome-avatar" aria-hidden="true">
        <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="13" cy="9.5" r="4" stroke="currentColor" stroke-width="1.6"/>
          <path d="M5 22c0-3.6 3.6-6 8-6s8 2.4 8 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="welcome-text">
        <span class="welcome-title">Welcome!</span>
        <span class="welcome-sub">Log in to access your account</span>
      </div>
    </div>
    <a class="welcome-login-btn" href="login.html">Log in</a>
  </div>

  <!-- HELP / INFO -->
  <div class="menu-section">
    <h3 class="menu-section-title">Help &amp; Info</h3>
    <div class="menu-grid">
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- User Guide: book / open pages -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 5.5C4 4.7 4.7 4 5.5 4H13V22H5.5C4.7 22 4 21.3 4 20.5V5.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M24 5.5C24 4.7 23.3 4 22.5 4H15V22H22.5C23.3 22 24 21.3 24 20.5V5.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M7 8.5h3M7 11.5h3M17.5 8.5h3M17.5 11.5h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="menu-item-label">User Guide</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- Help Center: ?-bubble inside a circle -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="14" cy="14" r="10" stroke="currentColor" stroke-width="1.6"/>
            <path d="M11 11.2C11 9.5 12.4 8 14 8s3 1.5 3 3.2c0 1.5-1 2-2 2.5-0.7 0.35-1 0.85-1 1.6V16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="14" cy="19.5" r="1.1" fill="currentColor"/>
          </svg>
        </span>
        <span class="menu-item-label">Help Center</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- Promotion: gift box with bow -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="10" width="20" height="4.5" rx="1" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <rect x="5.5" y="14.5" width="17" height="9.5" rx="1" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M14 10V24" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M14 10C12 10 9 8.7 9 6.7 9 5.7 9.7 5 10.7 5 12.7 5 14 10 14 10Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M14 10C16 10 19 8.7 19 6.7 19 5.7 18.3 5 17.3 5 15.3 5 14 10 14 10Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="menu-item-label">Promotion</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- About Us: i-info inside circle -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="14" cy="14" r="10" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="14" cy="9.5" r="1.2" fill="currentColor"/>
            <path d="M14 13V19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="menu-item-label">About Us</span>
      </button>
    </div>
  </div>

</div><!-- end phone -->
</body>
</html>
