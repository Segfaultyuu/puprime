<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>PU Prime – Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1dd1a1;
      --red: #ee5253;
      --blue: #006bff;
      --bg-dark: #0b0c1a;
      --bg-card: #141527;
      --bg-card2: #1a1b2e;
      --border-dark: rgba(255,255,255,0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.35);
    }

    body {
      background: var(--bg-dark);
      min-height: 100vh;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
    }

    .phone {
      width: 393px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--bg-dark);
      position: relative;
      overflow: hidden;
    }

    /* ─── BG GLOWS ─── */
    .menu-glow-1 {
      position: absolute;
      top: -80px; left: -120px;
      width: 360px; height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,107,255,0.22) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .menu-glow-2 {
      position: absolute;
      top: 100px; right: -90px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,180,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── STATUS BAR ─── */
    .status-bar {
      height: 54px;
      display: flex;
      align-items: flex-end;
      padding: 0 20px 10px;
      justify-content: space-between;
      position: relative;
      z-index: 20;
    }
    .status-time { font-size: 17px; font-weight: 600; color: #fff; line-height: 22px; }
    .status-icons { display: flex; align-items: center; gap: 6px; color: #fff; }
    .status-icons svg { fill: #fff; }

    /* ─── NAVBAR ─── */
    .navbar {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      justify-content: space-between;
      position: relative;
      z-index: 20;
    }
    .nav-back {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border-dark);
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
    }
    .nav-back svg { width: 18px; height: 18px; }
    .nav-icon-btn {
      width: 18px; height: 18px;
      background: none;
      border: none;
      padding: 0;
      color: #fff;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-icon-btn svg { width: 18px; height: 18px; }
    .nav-icon-btn:hover { opacity: 0.75; }

    /* ─── PROFILE CARD ─── */
    .profile-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 24px 24px;
      border-bottom: 1px solid var(--border-dark);
      position: relative;
      z-index: 5;
    }
    .profile-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .profile-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .profile-name { font-size: 16px; font-weight: 500; color: #fff; line-height: 1; }
    .profile-uid-row { display: flex; align-items: center; gap: 4px; }
    .profile-uid {
      font-size: 12px;
      color: #70707b;
      letter-spacing: -0.12px;
    }
    .profile-uid-copy {
      width: 12px; height: 12px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: #70707b;
    }
    .profile-uid-copy svg { width: 100%; height: 100%; }
    .profile-uid-copy:hover { color: #fff; }
    .profile-badges { display: flex; align-items: center; gap: 10px; margin-top: 2px; }
    .badge-verified {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #fff;
    }
    .badge-verified .check {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #04080f;
    }
    .badge-verified .check svg { width: 9px; height: 9px; }
    .badge-loyalty {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      height: 16px;
      border-radius: 100px;
      background: rgba(174,174,211,0.15);
      color: #aeaed3;
      font-size: 10px;
    }
    .badge-loyalty svg { width: 10px; height: 10px; }

    .profile-chevron {
      width: 24px; height: 24px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .profile-chevron svg { width: 100%; height: 100%; }

    /* ─── SECTION ─── */
    .menu-section { padding: 20px 0; }
    .menu-section + .menu-section { border-top: 1px solid var(--border-dark); }
    .menu-section-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.16px;
      padding: 0 24px;
      margin-bottom: 16px;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px 0;
      padding: 0 24px;
    }
    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 0;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      color: #eee;
      transition: opacity 0.18s;
    }
    .menu-item:hover { opacity: 0.75; }
    .menu-item-icon {
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      position: relative;
    }
    .menu-item-icon svg { width: 100%; height: 100%; display: block; }
    .menu-item-label {
      font-size: 12px;
      color: #eee;
      text-align: center;
      line-height: 1.25;
      letter-spacing: -0.12px;
    }
    .menu-item-badge {
      position: absolute;
      top: -3px; right: -6px;
      width: 8px; height: 8px;
      background: #ff4757;
      border-radius: 50%;
    }

    /* ─── FOOTER ACTIONS ─── */
    .menu-footer {
      padding: 32px 24px 100px;
      position: relative;
      z-index: 5;
    }
    .menu-logout {
      width: 100%;
      height: 46px;
      border-radius: 100px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.06px;
      transition: background 0.18s, border-color 0.18s;
    }
    .menu-logout:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.28); }
  </style>
</head>
<body>
<div class="phone">
  <div class="menu-glow-1"></div>
  <div class="menu-glow-2"></div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12">
        <rect x="0" y="8" width="3" height="4" rx="0.5" fill="currentColor"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="0.5" fill="currentColor"/>
        <rect x="9" y="3" width="3" height="9" rx="0.5" fill="currentColor"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="currentColor"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 9.5L8 9.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M5.5 7.2C6.2 6.5 7.05 6.1 8 6.1C8.95 6.1 9.8 6.5 10.5 7.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M3 4.7C4.35 3.4 6.1 2.6 8 2.6C9.9 2.6 11.65 3.4 13 4.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M0.5 2.1C2.35 0.35 5.05 -0.5 8 0.2C10.5 0.5 12.7 1.65 14.5 3.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
      </svg>
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="17" height="9" rx="2" fill="currentColor"/>
        <path d="M23.5 4.5V8.5C24.5 8 24.5 5 23.5 4.5Z" fill="currentColor" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- NAVBAR -->
  <div class="navbar">
    <a class="nav-back" href="home.html" aria-label="Back">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 5L8 11L14 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <button class="nav-icon-btn" aria-label="Settings" type="button">
      <!-- Cog / gear with proper teeth -->
      <svg viewBox="-1.5 -1.5 25 25" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19.4 13.1c0.06-0.36 0.1-0.72 0.1-1.1s-0.04-0.74-0.1-1.1l2.16-1.69a0.5 0.5 0 0 0 0.12-0.65l-2.05-3.55a0.5 0.5 0 0 0-0.61-0.22l-2.55 1.02a7.6 7.6 0 0 0-1.9-1.1l-0.39-2.71A0.5 0.5 0 0 0 13.7 1.6h-4.1a0.5 0.5 0 0 0-0.49 0.4l-0.39 2.71a7.7 7.7 0 0 0-1.9 1.1L4.27 4.79a0.5 0.5 0 0 0-0.6 0.22L1.62 8.56a0.5 0.5 0 0 0 0.12 0.65l2.16 1.69a7.7 7.7 0 0 0 0 2.2l-2.16 1.69a0.5 0.5 0 0 0-0.12 0.65l2.05 3.55c0.13 0.23 0.39 0.32 0.6 0.22l2.55-1.02c0.55 0.43 1.18 0.79 1.9 1.1l0.39 2.71c0.04 0.23 0.25 0.4 0.49 0.4h4.1c0.24 0 0.45-0.17 0.49-0.4l0.39-2.71a7.6 7.6 0 0 0 1.9-1.1l2.55 1.02c0.22 0.1 0.48 0.01 0.61-0.22l2.05-3.55a0.5 0.5 0 0 0-0.12-0.65l-2.16-1.69Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        <circle cx="11" cy="12" r="2.6" stroke="currentColor" stroke-width="1.4"/>
      </svg>
    </button>
  </div>

  <!-- PROFILE -->
  <div class="profile-row">
    <div class="profile-left">
      <div class="profile-avatar">
        <img src="images/avatar1.png" alt="Jason Wong" />
      </div>
      <div class="profile-info">
        <span class="profile-name">Jason Wong</span>
        <div class="profile-uid-row">
          <span class="profile-uid">UID : 5996638</span>
          <button class="profile-uid-copy" aria-label="Copy UID" type="button">
            <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3.5" y="3.5" width="6" height="7" rx="1" stroke="currentColor" stroke-width="1.1"/>
              <path d="M2.5 8V2.5C2.5 2 2.9 1.5 3.5 1.5H8" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="profile-badges">
          <div class="badge-verified">
            <span class="check">
              <svg viewBox="0 0 9 9" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 4.5L3.7 6.2L7 2.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            Verified
          </div>
          <div class="badge-loyalty">
            <svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 1L6.2 3.6L9 4L7 6L7.4 9L5 7.6L2.6 9L3 6L1 4L3.8 3.6L5 1Z" fill="currentColor"/>
            </svg>
            Platinum
          </div>
        </div>
      </div>
    </div>
    <div class="profile-chevron">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <!-- ASSETS -->
  <div class="menu-section">
    <h3 class="menu-section-title">Assets</h3>
    <div class="menu-grid">
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- Deposit: $ inside arrow-down-into-circle -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="14" cy="14" r="11" stroke="currentColor" stroke-width="1.6"/>
            <path d="M14 7v9.5M10.5 13l3.5 3.5L17.5 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 20.5h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="menu-item-label">Deposit</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- Transfer: two arrows opposite -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 10h14L15.5 6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M23 18H9l3.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="menu-item-label">Transfer</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- Withdraw: $ + arrow-up out of bank -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="14" cy="14" r="11" stroke="currentColor" stroke-width="1.6"/>
            <path d="M14 21V11.5M10.5 15l3.5-3.5L17.5 15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 7.5h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="menu-item-label">Withdraw</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- Funds: stacked coins / vault -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="14" cy="8" rx="8" ry="3" stroke="currentColor" stroke-width="1.6"/>
            <path d="M6 8v5c0 1.65 3.6 3 8 3s8-1.35 8-3V8" stroke="currentColor" stroke-width="1.6"/>
            <path d="M6 13v5c0 1.65 3.6 3 8 3s8-1.35 8-3v-5" stroke="currentColor" stroke-width="1.6"/>
          </svg>
        </span>
        <span class="menu-item-label">Funds</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- Wallet -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="7" width="22" height="15" rx="3" stroke="currentColor" stroke-width="1.6"/>
            <path d="M18 14.5h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="20" cy="14.5" r="1.2" fill="currentColor"/>
            <path d="M6 7V5.5C6 4.7 6.7 4 7.5 4h11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="menu-item-label">Wallet</span>
      </button>
    </div>
  </div>

  <!-- REWARDS -->
  <div class="menu-section">
    <h3 class="menu-section-title">Rewards</h3>
    <div class="menu-grid">
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- PU Rewards: trophy -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 5h10v5a5 5 0 0 1-10 0V5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M9 7H6a3 3 0 0 0 3 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M19 7h3a3 3 0 0 1-3 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M14 15v4M10 23h8M11 19h6l1 4H10l1-4Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="menu-item-label">PU Rewards</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- Mission: target / flag -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="14" cy="14" r="9" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="14" cy="14" r="5" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="14" cy="14" r="1.6" fill="currentColor"/>
          </svg>
        </span>
        <span class="menu-item-label">Mission</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- Coupons: ticket -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 10c1.5 0 2.5-1 2.5-2.2V7h17v0.8c0 1.2 1 2.2 2.5 2.2v8c-1.5 0-2.5 1-2.5 2.2V21h-17v-0.8C5.5 19 4.5 18 3 18v-8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M11 10v8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="1.5 2"/>
          </svg>
        </span>
        <span class="menu-item-label">Coupons</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- Referrals: people + arrow -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="11" r="3.2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M4.5 22c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M18 9h6M21 6l3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="menu-item-label">Referrals</span>
      </button>
    </div>
  </div>

  <!-- OTHER -->
  <div class="menu-section">
    <h3 class="menu-section-title">Other</h3>
    <div class="menu-grid">
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- IB: handshake / partnership -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 13L8 8L11 11L14 8L17 11L20 8L25 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 14V20C5 20.55 5.45 21 6 21H22C22.55 21 23 20.55 23 20V14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M11 16h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="menu-item-label">IB</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- Price Alerts: bell -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 19V13a7 7 0 1 1 14 0v6L23 21H5l2-2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M12 23a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="menu-item-label">Price Alerts</span>
      </button>
      <button class="menu-item" type="button">
        <span class="menu-item-icon">
          <!-- Security: shield + lock -->
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 3 5 6v7c0 5.5 4 10 9 11 5-1 9-5.5 9-11V6l-9-3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M10.5 14c0-1 0.8-1.8 1.8-1.8h3.4c1 0 1.8 0.8 1.8 1.8v4H10.5v-4Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <path d="M11.7 12.2v-1.5C11.7 9.5 12.7 8.5 14 8.5s2.3 1 2.3 2.2v1.5" stroke="currentColor" stroke-width="1.4"/>
          </svg>
          <span class="menu-item-badge"></span>
        </span>
        <span class="menu-item-label">Security</span>
